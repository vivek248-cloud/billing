{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Portal | Secure Login</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Soft pastel palette for Claymorphism */
      --bg-clay: #e0e7ff; 
      --clay-white: #ffffff;
      --clay-blue: #6366f1;
      --clay-blue-shadow: #4f46e5;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-clay);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #1e293b;
    }

    /* The Main Clay Card */
    .login-card {
      background: var(--clay-white);
      padding: 3rem 2.5rem;
      border-radius: 40px; /* Large rounded corners are key */
      
      /* Claymorphism Shadow Combo: Outer soft shadow + Inner highlight + Inner deep shadow */
      box-shadow: 
        20px 20px 40px rgba(0, 0, 0, 0.05),
        -20px -20px 40px rgba(255, 255, 255, 0.8),
        inset 8px 8px 16px rgba(0, 0, 0, 0.02),
        inset -8px -8px 16px rgba(255, 255, 255, 0.5);
      
      max-width: 400px;
      width: 90%;
      text-align: center;
      animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes bounceIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .logo-area {
      width: 70px;
      height: 70px;
      background: var(--clay-blue);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.8rem;
      color: white;
      
      /* Clay Icon Shadow */
      box-shadow: 
        inset -6px -6px 12px var(--clay-blue-shadow),
        inset 6px 6px 12px rgba(255, 255, 255, 0.3),
        10px 10px 20px rgba(99, 102, 241, 0.2);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #334155;
    }

    p.subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    /* Clay Styled Input */
    .input-group input {
      width: 100%;
      box-sizing: border-box;
      padding: 1.1rem 1rem 1.1rem 3.5rem;
      border: none;
      background: #f8fafc;
      border-radius: 20px;
      font-size: 1rem;
      color: #1e293b;
      outline: none;
      
      /* Inset shadow for the "hollow" clay look */
      box-shadow: 
        inset 6px 6px 10px rgba(0, 0, 0, 0.05),
        inset -6px -6px 10px rgba(255, 255, 255, 1);
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      box-shadow: 
        inset 4px 4px 6px rgba(99, 102, 241, 0.1),
        inset -4px -4px 6px rgba(255, 255, 255, 1);
    }

    .input-group i {
      position: absolute;
      left: 1.4rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }

    /* Clay Styled Button */
    button {
      width: 100%;
      padding: 1.1rem;
      background: var(--clay-blue);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      
      /* Multi-layer shadow for 3D clay depth */
      box-shadow: 
        inset -8px -8px 16px var(--clay-blue-shadow),
        inset 8px 8px 16px rgba(255, 255, 255, 0.2),
        10px 10px 20px rgba(0, 0, 0, 0.1);
      
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 
        inset -6px -6px 12px var(--clay-blue-shadow),
        inset 6px 6px 12px rgba(255, 255, 255, 0.3),
        12px 12px 24px rgba(0, 0, 0, 0.1);
    }

    button:active {
      transform: scale(0.98);
      box-shadow: 
        inset 4px 4px 8px var(--clay-blue-shadow),
        inset -4px -4px 8px rgba(255, 255, 255, 0.2);
    }

    .footer-note {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 1.8rem;
    }

    /* Customizing SweetAlert for Clay Theme */
    .swal2-popup {
      border-radius: 35px !important;
      box-shadow: 20px 20px 40px rgba(0,0,0,0.1) !important;
      background: white !important;
    }
    
    .swal2-confirm {
      border-radius: 15px !important;
      background-color: var(--clay-blue) !important;
      box-shadow: inset -4px -4px 8px var(--clay-blue-shadow) !important;
    }
  </style>
</head>

<body>

<div class="login-card">
  <div class="logo-area">
    <i class="fa fa-fingerprint"></i>
  </div>

  <h1>Client Portal</h1>
  <p class="subtitle">Enter your registered number to start</p>

  <form id="clientLoginForm">
    {% csrf_token %}

    <div class="input-group">
      <input type="tel" id="phoneInput" placeholder="Mobile Number" required autocomplete="off">
      <i class="fa fa-phone"></i>
    </div>

    <button type="submit">
      Continue <i class="fa fa-chevron-right"></i>
    </button>

    <div class="footer-note">
      Your information is always secure
    </div>
  </form>
</div>

<script>
  // Script logic remains functionally identical, handling the "Clay" button state
  document.getElementById("clientLoginForm").addEventListener("submit", function(e){
    e.preventDefault();
    let phone = document.getElementById("phoneInput").value;
    const btn = e.target.querySelector('button');
    const originalContent = btn.innerHTML;

    btn.innerHTML = '<i class="fa fa-circle-notch fa-spin"></i> Loading';
    btn.disabled = true;

    fetch("{% url 'client_login' %}", {
      method: "POST",
      headers: {
        "X-Requested-With": "XMLHttpRequest",
        "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value,
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: `phone=${phone}`
    })
    .then(res => res.json())
    .then(data => {
      btn.innerHTML = originalContent;
      btn.disabled = false;

      if(data.status === "success"){
        Swal.fire({
          title: "Verify Identity",
          html: `<div style="padding:15px; background:#f1f5f9; border-radius:20px; box-shadow: inset 4px 4px 8px rgba(0,0,0,0.05);">
                  <h3 style="margin:0; color:#4f46e5;">${data.client_name}</h3>
                  <p style="margin:5px 0 0; color:#64748b;">****${data.phone.slice(-4)}</p>
                 </div>`,
          icon: "info",
          showCancelButton: true,
          confirmButtonText: "Confirm",
          cancelButtonText: "No",
          confirmButtonColor: "#6366f1",
          cancelButtonColor: "#94a3b8"
        }).then((result)=>{
          if(result.isConfirmed){
            window.location.href = `/client/confirm-login/?phone=${data.phone}`;
          }
        });
      } else {
        Swal.fire({
          icon: "error",
          title: "Oops...",
          text: data.message,
          confirmButtonColor: "#6366f1"
        });
      }
    })
    .catch(() => {
        btn.innerHTML = originalContent;
        btn.disabled = false;
    });
  });
</script>

</body>
</html>
